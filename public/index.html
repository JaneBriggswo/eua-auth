<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>EUA Bypass - Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Debug - verificar se scripts estão carregando
        console.log('HTML carregado');
        window.addEventListener('error', function(e) {
            console.error('Erro ao carregar:', e);
        });
    </script>
</head>
<body>
    <div id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: Arial;">
            <div style="text-align: center;">
                <i class="fas fa-spinner fa-spin" style="font-size: 48px; margin-bottom: 20px;"></i>
                <p>Carregando EUA Bypass...</p>
                <p style="font-size: 12px; color: #888; margin-top: 10px;">Se não carregar, verifique o console (F12)</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    
    <script>
        // Verificar se bibliotecas carregaram
        console.log('React:', typeof React !== 'undefined' ? 'OK' : 'ERRO');
        console.log('ReactDOM:', typeof ReactDOM !== 'undefined' ? 'OK' : 'ERRO');
        console.log('Babel:', typeof Babel !== 'undefined' ? 'OK' : 'ERRO');
        console.log('Axios:', typeof axios !== 'undefined' ? 'OK' : 'ERRO');
    </script>
    
    <script type="text/babel" src="/js/app.js"></script>
</body>
</html>
